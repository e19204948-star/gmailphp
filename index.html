<?php
$filter = $_GET['filter'] ?? '';
$query = "SELECT * FROM mails WHERE receiver='$user'";

if ($filter === "star") {
    $query .= " AND starred=1";
}

$query .= " ORDER BY id DESC";

$result = $conn->query($query);

while($mail = $result->fetch_assoc()):
?>

<div class="mail">
<b><?= $mail['sender'] ?></b> -
<?= $mail['subject'] ?>

<br>

<a href="?action=star&id=<?= $mail['id'] ?>">⭐</a>
<a href="?action=delete&id=<?= $mail['id'] ?>">🗑️</a>
</div>
