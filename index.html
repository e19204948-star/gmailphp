<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Pro Firebase</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

#chat {
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px 12px;
    border-radius: 12px;
    max-width: 70%;
}

.me {
    background: #3b82f6;
    align-self: flex-end;
}

.other {
    background: #1f2937;
    align-self: flex-start;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>💬 Chat Pro Firebase</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="message" placeholder="Écris un message..." />
    <button onclick="sendMessage()">Envoyer</button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔧 TA CONFIG FIREBASE ICI
const firebaseConfig = {
    apiKey: "846140280738",
    authDomain: "messagerie.firebaseapp.com",
    projectId: "messagerie-cd2ba",
    storageBucket: "messagerie.appspot.com",
    messagingSenderId: "XXXX",
    appId: "messagerie"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

// Login anonyme
signInAnonymously(auth).then((user) => {
    userId = user.user.uid;
});

// Chat ref
const chatRef = collection(db, "messages");
const q = query(chatRef, orderBy("createdAt"));

const chatDiv = document.getElementById("chat");

// Réception messages temps réel
onSnapshot(q, (snapshot) => {
    chatDiv.innerHTML = "";
    snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.classList.add("msg");

        div.classList.add(data.uid === userId ? "me" : "other");
        div.textContent = data.text;

        chatDiv.appendChild(div);
    });

    chatDiv.scrollTop = chatDiv.scrollHeight;
});

// Envoyer message
window.sendMessage = async function () {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    await addDoc(chatRef, {
        text,
        uid: userId,
        createdAt: serverTimestamp()
    });

    input.value = "";
};
</script>

</body>
</html>
