<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash FIBRES - Contact</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fa; color: #333; }
    header { background: linear-gradient(90deg, #0a1f44, #1e90ff); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 24px; }
    nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .section { padding: 60px 40px; max-width: 800px; margin: 0 auto; text-align: center; }
    .contact-info { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    form { display: flex; flex-direction: column; gap: 15px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: left; }
    form label { font-weight: bold; color: #0a1f44; }
    form input, form textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
    form button { background: #1e90ff; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
    form button:hover { background: #0a1f44; }
    footer { background: #0a1f44; color: white; text-align: center; padding: 20px; margin-top: 40px; }
  </style>
</head>
<body>

<header>
  <h1>Flash FIBRES</h1>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="offres.html">Nos Offres</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="section" id="contact">
  <h2>Contactez-nous</h2>
  
  <div class="contact-info">
    <p><strong>Email :</strong> contact@flashfibres.com</p>
    <p><strong>Téléphone :</strong> 01 23 45 67 89</p>
  </div>

  <form action="#" method="POST">
    <label for="nom">Nom complet</label>
    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

    <label for="email">Adresse Email</label>
    <input type="email" id="email" name="email" placeholder="votre@email.com" required>

    <label for="message">Votre message</label>
    <textarea id="message" name="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>

    <button type="submit">Envoyer le message</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 Flash FIBRES - Tous droits réservés</p>
</footer>

</body>
</html>
