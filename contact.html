<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Flash Fibre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Flash<span>Fibre</span></a>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="offres.html">Nos Offres</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="content-section">
        <h2>Contactez-nous</h2>
        <p>Une question ? Un test d'éligibilité ? Laissez-nous un message.</p>
        
        <form action="#" method="POST">
            <label for="nom">Votre Nom :</label>
            <input type="text" id="nom" name="nom" required>
            
            <label for="email">Votre Email :</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Votre Message ou Adresse :</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <button type="submit" class="btn" style="border:none; cursor:pointer; width:100%;">Envoyer la demande</button>
        </form>
    </div>

    <footer><p>&copy; 2026 Flash Fibre.</p></footer>
</body>
</html>
