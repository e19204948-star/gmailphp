<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash FIBRES - Panier</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); color: #333; line-height: 1.6; }
    header { background: linear-gradient(135deg, #0a1f44 0%, #1e90ff 100%); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px rgba(10, 31, 68, 0.2); position: sticky; top: 0; z-index: 100; }
    header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; }
    header h1::before { content: '⚡'; font-size: 32px; animation: pulse 2s ease-in-out infinite; color: #1e90ff; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
    header h1:hover::before { animation: none; }
    nav a { color: white; margin-left: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; padding: 8px 16px; border-radius: 6px; }
    nav a:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .section { padding: 80px 40px; max-width: 1000px; margin: 0 auto; }
    .section h2 { font-size: 42px; color: #0a1f44; margin-bottom: 40px; font-weight: 700; }
    .cart-container { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
    .cart-items { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #e0e0e0; }
    .cart-item:last-child { border-bottom: none; }
    .item-info h3 { margin: 0 0 8px 0; color: #0a1f44; font-weight: 700; }
    .item-info p { margin: 5px 0; color: #666; font-size: 14px; }
    .item-price { font-size: 24px; font-weight: 700; color: #1e90ff; margin: 0 20px; min-width: 80px; text-align: right; }
    .quantity-control { display: flex; align-items: center; gap: 10px; }
    .qty-btn { background: #f0f0f0; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .qty-btn:hover { background: #1e90ff; color: white; }
    .qty-input { width: 50px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
    .remove-btn { background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
    .remove-btn:hover { background: #cc0000; }
    .empty-cart { text-align: center; padding: 60px 40px; color: #999; }
    .empty-cart p { font-size: 18px; margin-bottom: 30px; }
    .btn-continue { background: linear-gradient(135deg, #1e90ff, #0a6fd9); color: white; padding: 12px 30px; border: none; border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 30px; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(30, 144, 255, 0.3); }
    .btn-continue:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(30, 144, 255, 0.5); }
    .cart-summary { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); height: fit-content; }
    .summary-line { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0; }
    .summary-line:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .summary-total { font-size: 24px; font-weight: 700; color: #0a1f44; }
    .summary-amount { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #1e90ff, #0a1f44); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-checkout { background: linear-gradient(135deg, #1e90ff, #0a6fd9); color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(30, 144, 255, 0.3); margin-top: 20px; }
    .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(30, 144, 255, 0.5); }
    .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; }
    footer { background: linear-gradient(135deg, #0a1f44, #1e3a5f); color: white; text-align: center; padding: 30px; margin-top: 40px; font-size: 14px; }
    @media (max-width: 768px) {
      .cart-container { grid-template-columns: 1fr; }
      .cart-item { flex-direction: column; align-items: flex-start; }
      .item-price { margin: 15px 0; text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <h1>Flash FIBRES</h1>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="offres.html">Nos Offres</a>
    <a href="contact.html">Contact</a>
    <a href="panier.html">🛒 Panier <span id="cart-count"></span></a>
  </nav>
</header>

<section class="section">
  <h2>Votre Panier</h2>
  
  <div id="cart-content">
    <div class="empty-cart">
      <p>Votre panier est vide</p>
      <a href="offres.html" class="btn-continue">← Retour aux offres</a>
    </div>
  </div>
</section>

<footer>
  <p>&copy; 2026 Flash FIBRES - Tous droits réservés</p>
</footer>

<script>
  // Gestion du panier avec localStorage
  class Cart {
    constructor() {
      this.items = this.loadCart();
    }

    loadCart() {
      const saved = localStorage.getItem('cartItems');
      return saved ? JSON.parse(saved) : [];
    }

    saveCart() {
      localStorage.setItem('cartItems', JSON.stringify(this.items));
    }

    addItem(id, name, price, duration = '1 mois') {
      const existingItem = this.items.find(item => item.id === id);
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        this.items.push({ id, name, price, quantity: 1, duration });
      }
      this.saveCart();
      this.updateCartCount();
    }

    removeItem(id) {
      this.items = this.items.filter(item => item.id !== id);
      this.saveCart();
      this.updateCartCount();
    }

    updateQuantity(id, quantity) {
      const item = this.items.find(item => item.id === id);
      if (item) {
        item.quantity = Math.max(0, quantity);
        if (item.quantity === 0) {
          this.removeItem(id);
        } else {
          this.saveCart();
        }
        this.updateCartCount();
      }
    }

    getTotal() {
      return this.items.reduce((total, item) => total + (item.price * item.quantity), 0);
    }

    updateCartCount() {
      const count = this.items.reduce((sum, item) => sum + item.quantity, 0);
      const countElements = document.querySelectorAll('#cart-count');
      countElements.forEach(el => {
        el.textContent = count > 0 ? `(${count})` : '';
      });
    }

    renderCart() {
      const cartContent = document.getElementById('cart-content');
      
      if (this.items.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <p>Votre panier est vide</p>
            <a href="offres.html" class="btn-continue">← Retour aux offres</a>
          </div>
        `;
        return;
      }

      let itemsHTML = '<div class="cart-container"><div class="cart-items">';
      
      this.items.forEach(item => {
        itemsHTML += `
          <div class="cart-item">
            <div class="item-info">
              <h3>${item.name}</h3>
              <p>${item.duration}</p>
            </div>
            <div class="item-price">${item.price.toFixed(2)}€</div>
            <div class="quantity-control">
              <button class="qty-btn" onclick="cart.updateQuantity('${item.id}', ${item.quantity - 1})">−</button>
              <input type="number" class="qty-input" value="${item.quantity}" onchange="cart.updateQuantity('${item.id}', parseInt(this.value))">
              <button class="qty-btn" onclick="cart.updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
            </div>
            <div style="margin-left: 20px; text-align: right; min-width: 100px;">
              <div style="font-weight: 700; color: #0a1f44; margin-bottom: 10px;">${(item.price * item.quantity).toFixed(2)}€</div>
              <button class="remove-btn" onclick="cart.removeItem('${item.id}')">Supprimer</button>
            </div>
          </div>
        `;
      });

      const total = this.getTotal();
      itemsHTML += `
        </div>
        <div class="cart-summary">
          <div class="summary-line">
            <span>Sous-total</span>
            <span>${total.toFixed(2)}€</span>
          </div>
          <div class="summary-line">
            <span>Frais d'installation</span>
            <span>Gratuit</span>
          </div>
          <div class="summary-line">
            <span class="summary-total">TOTAL</span>
            <span class="summary-amount">${total.toFixed(2)}€</span>
          </div>
          <button class="btn-checkout" onclick="checkout()">Procéder au paiement</button>
          <a href="offres.html" class="btn-continue" style="display: block; text-align: center; margin-top: 15px;">← Continuer les achats</a>
        </div>
        </div>
      `;
      
      cartContent.innerHTML = itemsHTML;
    }
  }

  const cart = new Cart();

  function checkout() {
    if (cart.items.length > 0) {
      window.location.href = 'paiement.html';
    }
  }

  // Initialisation
  document.addEventListener('DOMContentLoaded', () => {
    cart.updateCartCount();
    cart.renderCart();
  });
</script>

</body>
</html>
